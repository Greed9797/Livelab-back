name: Backend CI

on:
  push:
    branches: [master, stabilization/core-restructure]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test + Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: livelab_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          for f in $(find src -name '*.js'); do
            node --check "$f" || exit 1
          done

      - name: Apply baseline schema (migrations 001-015)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/livelab_test
        run: |
          for f in \
            migrations/001_create_users.sql \
            migrations/002_create_refresh_tokens.sql \
            migrations/003_create_clientes.sql \
            migrations/004_create_contratos.sql \
            migrations/005_create_custos.sql \
            migrations/006_create_cabines.sql \
            migrations/007_create_lives.sql \
            migrations/008_create_leads.sql \
            migrations/009_create_boletos.sql \
            migrations/010_create_recomendacoes.sql \
            migrations/011_create_manuais.sql \
            migrations/012_add_tiktok_tokens_to_tenants.sql \
            migrations/013_create_live_snapshots.sql \
            migrations/014_create_live_products.sql \
            migrations/015_geocoding_contratos.sql ; do
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/livelab_test
          NODE_ENV: test
        run: node apply_migrations.js

      - name: Run tests + coverage threshold
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/livelab_test
          JWT_SECRET: test-secret-32-chars-minimum-here
          NODE_ENV: test
        run: npx vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          retention-days: 14

      - name: Audit (high severity)
        run: npm audit --omit=dev --audit-level=high || echo "Audit warnings"
